<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#f8fafc" rx="16"/>
  <circle cx="200" cy="200" r="140" fill="#e2e8f0" opacity="0.5"/>
  <!-- Aluminum Spirit Level Bar -->
  <g transform="rotate(-20 200 200)">
    <rect x="30" y="170" width="340" height="60" rx="6" fill="#f59e0b" stroke="#b45309" stroke-width="3"/>
    <!-- Shockproof rubber end caps -->
    <rect x="30" y="170" width="20" height="60" rx="4" fill="#0f172a"/>
    <rect x="350" y="170" width="20" height="60" rx="4" fill="#0f172a"/>
    <!-- Magnetic strip bottom edge -->
    <rect x="50" y="224" width="300" height="6" fill="#475569"/>
    <!-- Center Horizontal Vial Bubble -->
    <circle cx="200" cy="200" r="22" fill="#0f172a"/>
    <rect x="184" y="192" width="32" height="16" rx="8" fill="#10b981"/>
    <circle cx="196" cy="200" r="4" fill="#ffffff"/>
    <line x1="192" y1="192" x2="192" y2="208" stroke="#047857" stroke-width="1.5"/>
    <line x1="208" y1="192" x2="208" y2="208" stroke="#047857" stroke-width="1.5"/>
    <!-- Vertical Vial Bubble (Left) -->
    <circle cx="110" cy="200" r="18" fill="#0f172a"/>
    <rect x="104" y="188" width="12" height="24" rx="6" fill="#10b981"/>
    <circle cx="110" cy="198" r="3" fill="#ffffff"/>
    <!-- 45-degree Vial Bubble (Right) -->
    <circle cx="290" cy="200" r="18" fill="#0f172a"/>
    <rect x="284" y="194" width="12" height="12" rx="4" fill="#10b981" transform="rotate(45 290 200)"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#f8fafc" rx="16"/>
  <circle cx="200" cy="200" r="140" fill="#e2e8f0" opacity="0.5"/>
  <!-- Bolt 1 (Main diagonal) -->
  <g transform="rotate(-30 200 200)">
    <!-- Hex Head -->
    <path d="M 60,180 L 90,165 L 120,180 L 120,220 L 90,235 L 60,220 Z" fill="url(#zincGrad2)" stroke="#475569" stroke-width="2"/>
    <!-- Shank -->
    <rect x="120" y="186" width="180" height="28" fill="url(#zincGrad2)" stroke="#475569" stroke-width="2"/>
    <!-- Thread ridges -->
    <g fill="none" stroke="#64748b" stroke-width="3">
      <line x1="200" y1="186" x2="200" y2="214"/>
      <line x1="212" y1="186" x2="212" y2="214"/>
      <line x1="224" y1="186" x2="224" y2="214"/>
      <line x1="236" y1="186" x2="236" y2="214"/>
      <line x1="248" y1="186" x2="248" y2="214"/>
      <line x1="260" y1="186" x2="260" y2="214"/>
      <line x1="272" y1="186" x2="272" y2="214"/>
      <line x1="284" y1="186" x2="284" y2="214"/>
      <line x1="296" y1="186" x2="296" y2="214"/>
    </g>
    <!-- Hex Nut attached -->
    <path d="M 230,175 L 260,160 L 290,175 L 290,225 L 260,240 L 230,225 Z" fill="#94a3b8" stroke="#334155" stroke-width="3"/>
    <circle cx="260" cy="200" r="14" fill="#64748b"/>
  </g>
  <defs>
    <linearGradient id="zincGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>
</svg>

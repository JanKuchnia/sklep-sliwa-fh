<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#f8fafc" rx="16"/>
  <circle cx="200" cy="200" r="140" fill="#e2e8f0" opacity="0.5"/>
  <!-- Paint Tray (Kuweta) -->
  <polygon points="60,260 340,260 310,360 90,360" fill="#2563eb" opacity="0.85"/>
  <polygon points="75,275 325,275 300,345 100,345" fill="#1d4ed8"/>
  <!-- Paint Pool -->
  <ellipse cx="200" cy="330" rx="80" ry="12" fill="#ffffff" opacity="0.9"/>
  <!-- Paint Roller Frame & Cover -->
  <g transform="translate(40, -20) rotate(15 200 200)">
    <!-- Roller Sleeve -->
    <rect x="110" y="100" width="180" height="50" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
    <rect x="110" y="100" width="180" height="15" rx="4" fill="#f97316"/>
    <!-- Wire Frame -->
    <path d="M 290,125 L 320,125 L 320,220 L 210,220 L 210,270" fill="none" stroke="#64748b" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Plastic Handle -->
    <rect x="195" y="260" width="30" height="90" rx="6" fill="#0f172a"/>
    <rect x="200" y="270" width="20" height="70" rx="4" fill="#f97316"/>
  </g>
</svg>

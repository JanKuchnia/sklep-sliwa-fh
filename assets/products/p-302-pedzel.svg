<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#f8fafc" rx="16"/>
  <circle cx="200" cy="200" r="140" fill="#e2e8f0" opacity="0.5"/>
  <!-- Bristles -->
  <path d="M 150,50 L 250,50 L 245,140 L 155,140 Z" fill="#d97706"/>
  <path d="M 150,50 Q 200,40 250,50 L 245,100 Q 200,90 155,100 Z" fill="#f59e0b"/>
  <!-- Ferrule (Copper/Metal band) -->
  <rect x="150" y="140" width="100" height="45" rx="3" fill="#b45309" stroke="#78350f" stroke-width="2"/>
  <line x1="150" y1="162" x2="250" y2="162" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="170" cy="162" r="3" fill="#78350f"/>
  <circle cx="230" cy="162" r="3" fill="#78350f"/>
  <!-- Handle (Lacquered Wood) -->
  <path d="M 160,185 L 240,185 L 220,340 C 215,365 185,365 180,340 Z" fill="#7c2d12"/>
  <path d="M 185,185 L 215,185 L 205,335 C 202,350 198,350 195,335 Z" fill="#b45309" opacity="0.5"/>
  <!-- Hanging hole -->
  <circle cx="200" cy="325" r="8" fill="#0f172a"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#f8fafc" rx="16"/>
  <circle cx="200" cy="200" r="140" fill="#e2e8f0" opacity="0.5"/>
  <!-- 4-Segment Adjustable Stove Pipe Elbow -->
  <!-- Segment 1 (Vertical) -->
  <path d="M 120,330 L 220,330 L 220,240 L 120,265 Z" fill="#1e293b" stroke="#0f172a" stroke-width="3"/>
  <!-- Segment 2 (Lower Bend) -->
  <path d="M 120,265 L 220,240 L 255,185 L 140,195 Z" fill="#0f172a" stroke="#334155" stroke-width="3"/>
  <!-- Segment 3 (Upper Bend) -->
  <path d="M 140,195 L 255,185 L 280,120 L 180,110 Z" fill="#1e293b" stroke="#0f172a" stroke-width="3"/>
  <!-- Segment 4 (Horizontal Collar) -->
  <path d="M 180,110 L 280,120 L 280,70 L 180,70 Z" fill="#0f172a" stroke="#475569" stroke-width="3"/>
  <!-- Segment Seams / Joints -->
  <line x1="120" y1="265" x2="220" y2="240" stroke="#f97316" stroke-width="3"/>
  <line x1="140" y1="195" x2="255" y2="185" stroke="#f97316" stroke-width="3"/>
  <line x1="180" y1="110" x2="280" y2="120" stroke="#f97316" stroke-width="3"/>
  <!-- Inspection door / Revision Hatch -->
  <circle cx="185" cy="220" r="16" fill="#334155" stroke="#94a3b8" stroke-width="3"/>
  <circle cx="185" cy="220" r="6" fill="#0f172a"/>
</svg>

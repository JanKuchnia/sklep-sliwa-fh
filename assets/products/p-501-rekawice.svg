<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#f8fafc" rx="16"/>
  <circle cx="200" cy="200" r="140" fill="#e2e8f0" opacity="0.5"/>
  <!-- Pair of Nitrile-coated Work Gloves -->
  <!-- Left Glove (Knit polyester + Black Nitrile) -->
  <g transform="translate(40, 40) rotate(-10 160 160)">
    <!-- Cuff -->
    <rect x="110" y="220" width="80" height="60" rx="8" fill="#f97316" stroke="#ea580c" stroke-width="3"/>
    <line x1="110" y1="240" x2="190" y2="240" stroke="#ffffff" stroke-width="2" stroke-dasharray="4 4"/>
    <line x1="110" y1="260" x2="190" y2="260" stroke="#ffffff" stroke-width="2" stroke-dasharray="4 4"/>
    <!-- Palm & Fingers (Black Nitrile Coating) -->
    <path d="M 110,220 L 110,130 C 110,110 125,100 130,100 C 135,100 142,110 142,130 L 142,90 C 142,75 156,75 160,75 C 165,75 174,80 174,95 L 174,85 C 174,70 188,70 192,70 C 197,70 206,80 206,95 L 206,140 C 206,130 220,130 225,140 L 225,180 C 225,210 190,220 190,220 Z" fill="#0f172a"/>
    <!-- Back of Hand Overlay (Breathable Gray Knit) -->
    <path d="M 125,150 C 125,150 150,140 175,150 C 185,190 175,220 175,220 L 125,220 Z" fill="#94a3b8" opacity="0.8"/>
  </g>
  <!-- EN 388 Safety Badge -->
  <rect x="130" y="320" width="140" height="36" rx="6" fill="#10b981"/>
  <text x="200" y="343" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" text-anchor="middle">EN 388 (4121X)</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#f8fafc" rx="16"/>
  <circle cx="200" cy="200" r="140" fill="#e2e8f0" opacity="0.5"/>
  <!-- DIN 766 Technical Steel Chain Interlocking Links -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Link 1 -->
    <rect x="70" y="160" width="90" height="80" rx="35" stroke="url(#zincGrad)" stroke-width="22"/>
    <!-- Link 2 (Vertical perspective) -->
    <rect x="135" y="180" width="90" height="40" rx="20" stroke="#64748b" stroke-width="20"/>
    <!-- Link 3 -->
    <rect x="200" y="160" width="90" height="80" rx="35" stroke="url(#zincGrad)" stroke-width="22"/>
    <!-- Link 4 (Vertical perspective) -->
    <rect x="265" y="180" width="90" height="40" rx="20" stroke="#64748b" stroke-width="20"/>
  </g>
  <!-- Link Highlights & Galvanized Metallic Effect -->
  <g fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6">
    <rect x="78" y="168" width="74" height="64" rx="28"/>
    <rect x="208" y="168" width="74" height="64" rx="28"/>
  </g>
  <!-- Technical Spec Badge overlay -->
  <rect x="120" y="300" width="160" height="40" rx="8" fill="#0f172a"/>
  <text x="200" y="325" fill="#f97316" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" text-anchor="middle">DIN 766 | 6mm</text>
  <defs>
    <linearGradient id="zincGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="30%" stop-color="#f1f5f9"/>
      <stop offset="70%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>
</svg>

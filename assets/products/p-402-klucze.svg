<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="400" height="400" fill="#f8fafc" rx="16"/>
  <circle cx="200" cy="200" r="140" fill="#e2e8f0" opacity="0.5"/>
  <!-- Canvas Tool Roll / Pouch (B2B Blue) -->
  <rect x="50" y="60" width="300" height="280" rx="12" fill="#2563eb"/>
  <rect x="65" y="180" width="270" height="145" rx="6" fill="#1d4ed8"/>
  <!-- Pouch slots -->
  <line x1="105" y1="180" x2="105" y2="325" stroke="#2563eb" stroke-width="2"/>
  <line x1="145" y1="180" x2="145" y2="325" stroke="#2563eb" stroke-width="2"/>
  <line x1="185" y1="180" x2="185" y2="325" stroke="#2563eb" stroke-width="2"/>
  <line x1="225" y1="180" x2="225" y2="325" stroke="#2563eb" stroke-width="2"/>
  <line x1="265" y1="180" x2="265" y2="325" stroke="#2563eb" stroke-width="2"/>
  <line x1="305" y1="180" x2="305" y2="325" stroke="#2563eb" stroke-width="2"/>
  <!-- Chrome Vanadium Spanners (Array of sizes) -->
  <!-- Wrench 1 (Large) -->
  <g stroke="#475569" stroke-width="2">
    <rect x="75" y="90" width="20" height="200" rx="4" fill="url(#crvGrad)"/>
    <circle cx="85" cy="95" r="18" fill="url(#crvGrad)"/>
    <circle cx="85" cy="95" r="10" fill="#2563eb"/>
    <circle cx="85" cy="285" r="18" fill="url(#crvGrad)"/>
  </g>
  <!-- Wrench 2 -->
  <g stroke="#475569" stroke-width="2">
    <rect x="115" y="110" width="18" height="180" rx="4" fill="url(#crvGrad)"/>
    <circle cx="124" cy="115" r="15" fill="url(#crvGrad)"/>
    <circle cx="124" cy="115" r="8" fill="#2563eb"/>
  </g>
  <!-- Wrench 3 -->
  <g stroke="#475569" stroke-width="2">
    <rect x="155" y="130" width="16" height="160" rx="4" fill="url(#crvGrad)"/>
    <circle cx="163" cy="135" r="13" fill="url(#crvGrad)"/>
    <circle cx="163" cy="135" r="7" fill="#2563eb"/>
  </g>
  <!-- Wrench 4 -->
  <g stroke="#475569" stroke-width="2">
    <rect x="195" y="150" width="14" height="140" rx="3" fill="url(#crvGrad)"/>
    <circle cx="202" cy="155" r="11" fill="url(#crvGrad)"/>
    <circle cx="202" cy="155" r="6" fill="#2563eb"/>
  </g>
  <!-- CrV Stamp Badge -->
  <text x="200" y="360" fill="#ffffff" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" text-anchor="middle">CrV 6mm - 32mm</text>
  <defs>
    <linearGradient id="crvGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
</svg>
